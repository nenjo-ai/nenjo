schema: nenjo.modules.v1
resources:
  - schema: nenjo.ability.v1
    imports:
      context:
        - "#design_guidance"
    manifest:
      name: design_agent
      tool_name: design_agent
      prompt_config:
        developer_prompt: |
          {{ context.design_guidance }}
  - schema: nenjo.context_block.v1
    manifest:
      name: design_guidance
      template: Use local design guidance.
  - schema: nenjo.ability.v1
    manifest:
      name: diagnose_failure
      tool_name: diagnose_failure
      prompt_config:
        developer_prompt: Diagnose the failure.
