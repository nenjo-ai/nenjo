schema: nenjo.modules.v1
resources:
  - schema: nenjo.context_block.v1
    manifest:
      name: methodology
      template: Think through the work carefully.
  - schema: nenjo.context_block.v1
    imports:
      context:
        - "#methodology"
    manifest:
      name: tool_usage
      template: |
        {{ context.methodology }}
        Use tools when they provide current evidence.
