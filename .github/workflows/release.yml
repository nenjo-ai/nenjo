name: Release

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read
  id-token: write

jobs:
  release:
    name: Release
    runs-on: blacksmith-4vcpu-ubuntu-2404
    if: ${{ github.repository_owner == 'nenjo-ai' }}
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run release-plz
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version
        id: version
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

  build-binaries:
    name: "Build release binaries (${{ matrix.target }})"
    runs-on: ${{ matrix.os }}
    needs: release
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: |
          cargo build --release \
            --package nenjo-cli \
            --package nenpm-cli \
            --package nenjoup-cli \
            --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/nenjo dist/nenjo
          cp target/${{ matrix.target }}/release/nenpm dist/nenpm
          cp target/${{ matrix.target }}/release/nenjoup dist/nenjoup

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nenjo-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish release artifacts
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: [release, build-binaries]
    if: ${{ github.repository_owner == 'nenjo-ai' }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package and upload artifacts to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_tag="${{ needs.release.outputs.tag }}"
          for target in x86_64-unknown-linux-gnu aarch64-apple-darwin; do
            dir="artifacts/nenjo-${target}"
            chmod +x "${dir}/nenjo" "${dir}/nenpm" "${dir}/nenjoup"
            printf '{"version":"%s","target":"%s","binaries":["nenjo","nenpm","nenjoup"]}\n' "${release_tag}" "${target}" > "${dir}/manifest.json"
            tar -czf "nenjo-${target}.tar.gz" -C "${dir}" nenjo nenpm nenjoup manifest.json
            shasum -a 256 "nenjo-${target}.tar.gz" > "nenjo-${target}.tar.gz.sha256"
          done
          gh release upload "${release_tag}" \
            nenjo-x86_64-unknown-linux-gnu.tar.gz \
            nenjo-x86_64-unknown-linux-gnu.tar.gz.sha256 \
            nenjo-aarch64-apple-darwin.tar.gz \
            nenjo-aarch64-apple-darwin.tar.gz.sha256

  publish-images:
    name: Publish Docker images
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: release
    if: ${{ github.repository_owner == 'nenjo-ai' }}
    env:
      IMAGE_NAME: ghcr.io/nenjo-ai/nenjo-worker
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Resolve image metadata
        id: metadata
        run: |
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3

      - uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish runtime image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          target: runtime
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.tag }}
            ${{ env.IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.title=Nenjo Worker
            org.opencontainers.image.description=Production Nenjo platform worker image
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.tag }}
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            VERSION=${{ needs.release.outputs.tag }}
            REVISION=${{ steps.metadata.outputs.revision }}
            CREATED=${{ steps.metadata.outputs.created }}
          provenance: false

      - name: Build and publish dev image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          target: dev
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.tag }}-dev
            ${{ env.IMAGE_NAME }}:dev
          labels: |
            org.opencontainers.image.title=Nenjo Worker Dev
            org.opencontainers.image.description=Developer toolbox image for the Nenjo platform worker
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.tag }}-dev
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            VERSION=${{ needs.release.outputs.tag }}-dev
            REVISION=${{ steps.metadata.outputs.revision }}
            CREATED=${{ steps.metadata.outputs.created }}
          provenance: false

      - name: Build and publish heavy image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          target: heavy
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ needs.release.outputs.tag }}-heavy
            ${{ env.IMAGE_NAME }}:heavy
          labels: |
            org.opencontainers.image.title=Nenjo Worker Heavy
            org.opencontainers.image.description=Developer toolbox image with agent-browser and Chromium
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.version=${{ needs.release.outputs.tag }}-heavy
            org.opencontainers.image.revision=${{ steps.metadata.outputs.revision }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
            org.opencontainers.image.licenses=Apache-2.0
          build-args: |
            VERSION=${{ needs.release.outputs.tag }}-heavy
            REVISION=${{ steps.metadata.outputs.revision }}
            CREATED=${{ steps.metadata.outputs.created }}
          provenance: false
