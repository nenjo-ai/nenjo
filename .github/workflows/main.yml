name: Main

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  fmt:
    name: Format
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy
        run: cargo clippy --workspace --all-targets

  build:
    name: Build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: Build
        run: cargo build --workspace

  audit:
    name: Audit Dependencies
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
        env:
          RUSTFLAGS: ""
      - name: Audit
        run: cargo audit

  test:
    name: Test
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace

  docker:
    name: Docker Images
    needs: build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - uses: useblacksmith/setup-docker-builder@v1

      - name: Build runtime image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          target: runtime
          load: true
          tags: nenjo-worker:ci-runtime

      - name: Smoke test runtime image
        run: |
          docker run --rm nenjo-worker:ci-runtime --version
          docker run --rm --entrypoint nenpm nenjo-worker:ci-runtime --version
          docker run --rm --entrypoint nenjoup nenjo-worker:ci-runtime --version
          docker run --rm --entrypoint sh nenjo-worker:ci-runtime -c '
            python3 --version &&
            python3 -m venv /tmp/venv &&
            curl --version &&
            wget --version &&
            jq --version &&
            git --version &&
            git lfs version &&
            rg --version &&
            tar --version
          '

      - name: Build dev image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          target: dev
          load: true
          tags: nenjo-worker:ci-dev

      - name: Smoke test dev image
        run: |
          docker run --rm --entrypoint sh nenjo-worker:ci-dev -c '
            rustc --version &&
            cargo --version &&
            node --version &&
            npm --version &&
            gh --version &&
            docker --version &&
            python3 -m venv /tmp/venv
          '
